name: Test and Release
# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}
# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# npm 11.x bundled with Node.js 22.22.x is missing promise-retry from its
# bundled deps, which breaks npm publish, npx, and any npm operation that
# triggers arborist/rebuild. The workaround (replacing npm with npm@10.9.2)
# is applied in adapter-tests for Linux + Node 22.x only. Jobs using
# Node 24.x (check-and-lint, deploy) are unaffected and need no workaround.
jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: '24.x'
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          lint: true
  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    needs: [check-and-lint]
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Replace broken npm with npm@10 (Linux + Node 22.x only)
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: |
          NPM_GLOBAL="$(dirname $(dirname $(which npm)))/lib/node_modules/npm"
          rm -rf "$NPM_GLOBAL" && mkdir -p "$NPM_GLOBAL"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-10.9.2.tgz" \
            | tar xz --strip-components=1 -C "$NPM_GLOBAL"
          echo "npm version: $(npm --version)"
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
  # Deploys the final package to NPM
  deploy:
    needs: [check-and-lint, adapter-tests]
    # Trigger this step only when a commit on any branch is tagged with a version number
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Write permissions are required to create Github releases
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - uses: ioBroker/testing-action-deploy@v1
        with:
          node-version: '24.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}
        # When using Sentry for error reporting, Sentry can be informed about new releases
        # To enable create a API-Token in Sentry (User settings, API keys)
        # Enter this token as a GitHub secret (with name SENTRY_AUTH_TOKEN) in the repository options
        # Then uncomment and customize the following block:
        #  sentry: true
        #  sentry-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
        #  sentry-project: "iobroker-sigenergy"
        #  sentry-version-prefix: "iobroker.sigenergy"
        #  # If your sentry project is linked to a GitHub repository, you can enable the following option
        #  sentry-github-integration: true
